[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# Redirect all API routes to Netlify Serverless Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

# Support Single Page Application (SPA) client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
